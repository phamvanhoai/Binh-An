
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#06071a; overflow:hidden; }
  canvas { display:block; }
  #ui {
    position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
    text-align:center; pointer-events:none;
  }
  #hint {
    color:rgba(255,210,110,0.8); font-size:14px; letter-spacing:.1em;
    font-family:'Georgia',serif; text-shadow:0 0 14px rgba(255,170,40,.5);
    animation:fp 2.8s ease-in-out infinite;
  }
  @keyframes fp { 0%,100%{opacity:.6} 50%{opacity:1} }
  #prayer-wrap {
    pointer-events:all; margin-top:10px;
    display:flex; gap:8px; justify-content:center; align-items:center;
  }
  #prayer-inp {
    background:rgba(255,200,80,.08); border:1px solid rgba(255,190,70,.35);
    border-radius:18px; color:rgba(255,230,140,.9); font-size:13px;
    padding:7px 16px; width:210px; outline:none; font-family:'Georgia',serif;
  }
  #prayer-inp::placeholder { color:rgba(255,190,70,.4); }
  #tha-btn {
    background:rgba(255,170,40,.15); border:1px solid rgba(255,200,80,.4);
    border-radius:18px; color:rgba(255,225,120,.9); font-size:13px;
    padding:7px 16px; cursor:pointer; font-family:'Georgia',serif; transition:.2s;
  }
  #tha-btn:hover { background:rgba(255,170,40,.3); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="hint">✦ Nhấp vào mặt nước để thả hoa đăng ✦</div>
  <div id="prayer-wrap">
    <input id="prayer-inp" type="text" placeholder="Lời nguyện cầu..." maxlength="28"/>
    <button id="tha-btn">Thả 🪔</button>
  </div>
</div>

<script>
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
let W, H;
function rsz(){ W=cv.width=window.innerWidth; H=cv.height=window.innerHeight; }
rsz(); window.addEventListener('resize',rsz);

// ---- Hoa đăng SVG offline → vẽ bằng canvas 2D chi tiết ----
function drawLotusLantern(g, cx, px, py, sc, opacity, flicker, hue) {
  g.save();
  g.globalAlpha = opacity;
  g.translate(px, py);
  g.scale(sc, sc);

  // kích thước cơ bản
  const R = 28; // bán kính hoa

  // -- Ánh sáng hào quang --
  const glow = g.createRadialGradient(0,0,R*0.2,0,0,R*3.5);
  glow.addColorStop(0,`hsla(${hue},100%,70%,${0.22*flicker})`);
  glow.addColorStop(0.5,`hsla(${hue},90%,50%,${0.08*flicker})`);
  glow.addColorStop(1,'transparent');
  g.fillStyle=glow;
  g.beginPath(); g.arc(0,0,R*3.5,0,Math.PI*2); g.fill();

  // -- Lá sen (đĩa) --
  g.save();
  // đĩa lá
  g.beginPath();
  g.ellipse(0, R*0.82, R*1.18, R*0.28, 0, 0, Math.PI*2);
  const leafG = g.createRadialGradient(0,R*0.7,0,0,R*0.85,R*1.1);
  leafG.addColorStop(0,'#3d8c40');
  leafG.addColorStop(0.5,'#2e7031');
  leafG.addColorStop(1,'#1a4d1c');
  g.fillStyle=leafG; g.fill();
  // gân lá
  g.strokeStyle='rgba(100,180,90,0.45)'; g.lineWidth=0.8;
  for(let i=-4;i<=4;i++){
    g.beginPath();
    g.moveTo(0,R*0.82);
    g.quadraticCurveTo(i*R*0.22, R*0.65, i*R*0.32, R*1.0);
    g.stroke();
  }
  // rim lá
  g.beginPath();
  g.ellipse(0, R*0.82, R*1.18, R*0.28, 0, 0, Math.PI*2);
  g.strokeStyle='rgba(60,120,55,0.6)'; g.lineWidth=1.2; g.stroke();
  g.restore();

  // -- Cánh hoa sen bên ngoài (layer 1) --
  const outerPetals = 8;
  for(let i=0;i<outerPetals;i++){
    const a = (i/outerPetals)*Math.PI*2;
    g.save();
    g.rotate(a);
    g.beginPath();
    g.moveTo(0, R*0.55);
    g.bezierCurveTo(
      R*0.55, R*0.3,
      R*0.7, -R*0.15,
      0, -R*0.6
    );
    g.bezierCurveTo(
      -R*0.7, -R*0.15,
      -R*0.55, R*0.3,
      0, R*0.55
    );
    const pg = g.createLinearGradient(0,-R*0.6,0,R*0.55);
    pg.addColorStop(0,`hsla(${hue},90%,88%,0.95)`);
    pg.addColorStop(0.4,`hsla(${hue+5},85%,72%,0.9)`);
    pg.addColorStop(1,`hsla(${hue+10},75%,55%,0.85)`);
    g.fillStyle=pg; g.fill();
    g.strokeStyle=`hsla(${hue},60%,50%,0.4)`; g.lineWidth=0.6; g.stroke();
    // đường gân cánh
    g.beginPath(); g.moveTo(0,R*0.5); g.lineTo(0,-R*0.55);
    g.strokeStyle=`hsla(${hue},50%,75%,0.3)`; g.lineWidth=0.5; g.stroke();
    g.restore();
  }

  // -- Cánh hoa giữa (layer 2) --
  const midPetals = 6;
  for(let i=0;i<midPetals;i++){
    const a = (i/midPetals)*Math.PI*2 + Math.PI/midPetals;
    g.save();
    g.rotate(a);
    g.beginPath();
    g.moveTo(0, R*0.3);
    g.bezierCurveTo(
      R*0.38, R*0.1,
      R*0.42, -R*0.3,
      0, -R*0.55
    );
    g.bezierCurveTo(
      -R*0.42, -R*0.3,
      -R*0.38, R*0.1,
      0, R*0.3
    );
    const pg2 = g.createLinearGradient(0,-R*0.55,0,R*0.3);
    pg2.addColorStop(0,`hsla(${hue-5},95%,95%,0.98)`);
    pg2.addColorStop(0.5,`hsla(${hue},88%,78%,0.92)`);
    pg2.addColorStop(1,`hsla(${hue+10},80%,60%,0.85)`);
    g.fillStyle=pg2; g.fill();
    g.strokeStyle=`hsla(${hue},55%,55%,0.35)`; g.lineWidth=0.5; g.stroke();
    g.restore();
  }

  // -- Ngọn nến ở giữa --
  // đài nến
  g.beginPath();
  g.ellipse(0, R*0.05, R*0.22, R*0.1, 0, 0, Math.PI*2);
  g.fillStyle='rgba(255,245,210,0.95)'; g.fill();

  // nến
  g.beginPath();
  g.roundRect(-R*0.08, -R*0.32, R*0.16, R*0.38, 3);
  const candleG = g.createLinearGradient(-R*0.08,0,R*0.08,0);
  candleG.addColorStop(0,'rgba(255,248,230,0.9)');
  candleG.addColorStop(0.5,'rgba(255,252,240,0.98)');
  candleG.addColorStop(1,'rgba(230,220,200,0.85)');
  g.fillStyle=candleG; g.fill();

  // ngọn lửa
  const fk = 0.85 + flicker*0.25;
  g.save();
  g.translate(0, -R*0.34);
  // hào quang lửa
  const fireGlow = g.createRadialGradient(0,0,0,0,0,R*0.45);
  fireGlow.addColorStop(0,`rgba(255,240,140,${0.55*fk})`);
  fireGlow.addColorStop(0.5,`rgba(255,160,40,${0.22*fk})`);
  fireGlow.addColorStop(1,'transparent');
  g.fillStyle=fireGlow;
  g.beginPath(); g.arc(0,0,R*0.45,0,Math.PI*2); g.fill();
  // thân lửa
  g.beginPath();
  g.moveTo(0, R*0.14);
  g.bezierCurveTo(R*0.12,R*0.06, R*0.1,-R*0.1, 0,-R*0.22*fk);
  g.bezierCurveTo(-R*0.1,-R*0.1, -R*0.12,R*0.06, 0,R*0.14);
  const fireG=g.createLinearGradient(0,R*0.14,0,-R*0.22*fk);
  fireG.addColorStop(0,'rgba(255,200,50,0.95)');
  fireG.addColorStop(0.4,'rgba(255,130,20,0.9)');
  fireG.addColorStop(1,'rgba(255,240,180,0.7)');
  g.fillStyle=fireG; g.fill();
  // lõi lửa
  g.beginPath();
  g.moveTo(0,R*0.1);
  g.bezierCurveTo(R*0.05,0,R*0.04,-R*0.1, 0,-R*0.18*fk);
  g.bezierCurveTo(-R*0.04,-R*0.1,-R*0.05,0,0,R*0.1);
  g.fillStyle='rgba(255,250,200,0.92)'; g.fill();
  g.restore();

  g.restore(); // globalAlpha
}

// ---- Nền trời, nước ----
const stars = Array.from({length:130},()=>({
  x:Math.random(), y:Math.random()*0.48,
  r:Math.random()*1.3+0.3, phase:Math.random()*6.28,
  sp:Math.random()*0.01+0.003
}));

function drawSky(){
  const g=cx.createLinearGradient(0,0,0,H*0.52);
  g.addColorStop(0,'#02020e');
  g.addColorStop(0.5,'#090720');
  g.addColorStop(1,'#140e30');
  cx.fillStyle=g; cx.fillRect(0,0,W,H*0.52);
}
function drawStars(){
  stars.forEach(s=>{
    s.phase+=s.sp;
    const a=0.45+0.45*Math.sin(s.phase);
    cx.beginPath(); cx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    cx.fillStyle=`rgba(255,240,200,${a})`; cx.fill();
  });
}
function drawMoon(){
  const mx=W*0.76, my=H*0.1, mr=W*0.036;
  const g=cx.createRadialGradient(mx,my,mr*0.4,mx,my,mr*2.5);
  g.addColorStop(0,'rgba(255,245,180,0.15)'); g.addColorStop(1,'transparent');
  cx.fillStyle=g; cx.beginPath(); cx.arc(mx,my,mr*2.5,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(mx,my,mr,0,Math.PI*2);
  cx.fillStyle='#fff8e0'; cx.fill();
  cx.beginPath(); cx.arc(mx+mr*0.32,my-mr*0.1,mr*0.83,0,Math.PI*2);
  cx.fillStyle='#09061e'; cx.fill();
}

const ripples=[];
function addRipple(x,y){
  ripples.push({x,y,r:0,max:Math.min(W,H)*0.05,a:0.5});
}

function drawWater(t){
  const wy=H*0.5;
  const wg=cx.createLinearGradient(0,wy,0,H);
  wg.addColorStop(0,'#080618'); wg.addColorStop(0.5,'#050410'); wg.addColorStop(1,'#020208');
  cx.fillStyle=wg; cx.fillRect(0,wy,W,H-wy);

  // moon reflection
  const mx=W*0.76;
  for(let i=0;i<4;i++){
    const ry=wy+H*0.055+i*H*0.038;
    cx.beginPath();
    cx.ellipse(mx+Math.sin(t*0.4+i)*W*0.009, ry, W*0.018*(4-i), H*0.009, 0,0,Math.PI*2);
    cx.fillStyle=`rgba(255,245,180,${0.12-i*0.025})`; cx.fill();
  }
  // shimmer
  for(let i=0;i<22;i++){
    const ly=wy+(i+1)*(H-wy)/24;
    const lx=W*(0.1+Math.sin(t*0.25+i*0.8)*0.04);
    const lw=W*0.07*(0.6+Math.sin(t*0.18+i)*0.35);
    cx.beginPath(); cx.moveTo(lx,ly); cx.lineTo(lx+lw,ly);
    cx.strokeStyle=`rgba(255,215,100,${0.035+0.018*Math.sin(t*0.28+i)})`;
    cx.lineWidth=0.9; cx.stroke();
  }
  // ripples
  ripples.forEach(r=>{
    r.r+=0.006; r.a=0.4*(1-r.r/r.max);
    cx.beginPath();
    cx.ellipse(r.x*W, wy+r.y*(H-wy), r.r*W, r.r*W*0.3, 0,0,Math.PI*2);
    cx.strokeStyle=`rgba(255,200,90,${r.a})`; cx.lineWidth=1; cx.stroke();
  });
  for(let i=ripples.length-1;i>=0;i--) if(ripples[i].r>=ripples[i].max) ripples.splice(i,1);
}

function drawShore(){
  const wy=H*0.5;
  // đất bờ
  cx.fillStyle='#141008';
  cx.fillRect(0,wy-H*0.04,W,H*0.045);
  // cỏ lau / bờ
  for(let i=0;i<18;i++){
    const bx=W*(0.02+i*0.056+Math.sin(i)*0.01);
    const bh=H*(0.04+Math.sin(i*1.7)*0.015);
    cx.beginPath();
    cx.moveTo(bx,wy-H*0.005);
    cx.quadraticCurveTo(bx+Math.sin(i)*8,wy-bh*0.5,bx+Math.sin(i*0.5)*5,wy-bh);
    cx.strokeStyle=`rgba(${30+i*3},${60+i*2},20,0.7)`; cx.lineWidth=1.5+Math.sin(i)*0.5; cx.stroke();
  }
}

// Hoa đăng đang nằm bờ (chờ thả)
const shoreLanterns=Array.from({length:7},(_,i)=>({
  x:0.07+i*0.135,
  hue:15+i*12,
  flick:Math.random()*6.28,
  flickSp:0.03+Math.random()*0.02
}));

// Hoa đăng trôi
const floaters=[];
function spawnFloater(nx, prayer){
  floaters.push({
    x:nx, y:0.01+Math.random()*0.05,
    vx:(Math.random()-0.5)*0.00025,
    vy:Math.random()*0.00012+0.00005,
    prayer:prayer||'',
    age:0, life:2200+Math.random()*1200,
    wobble:Math.random()*6.28,
    wobbleSp:0.012+Math.random()*0.01,
    hue:15+Math.floor(Math.random()*8)*12,
    sc:0.7+Math.random()*0.35,
    flick:Math.random()*6.28,
    flickSp:0.04+Math.random()*0.03
  });
}

let T=0;
function loop(){
  T+=0.016;
  cx.clearRect(0,0,W,H);
  drawSky();
  drawStars();
  drawMoon();
  drawWater(T);

  const wy=H*0.5;

  // Shore lanterns
  drawShore();
  const shoreBaseY=wy-H*0.038;
  shoreLanterns.forEach(sl=>{
    sl.flick+=sl.flickSp;
    const fk=0.88+Math.sin(sl.flick)*0.12;
    drawLotusLantern(cx, cx, sl.x*W, shoreBaseY, Math.min(W,H)*0.0016, 0.9, fk, sl.hue);
  });

  // Floating lanterns
  floaters.forEach(f=>{
    f.age++; f.wobble+=f.wobbleSp; f.flick+=f.flickSp;
    f.x+=f.vx; f.y+=f.vy; f.vy*=0.997;
    if(f.x<0)f.x=1; if(f.x>1)f.x=0;
    const prog=f.age/f.life;
    let op=prog<0.08?prog/0.08:(prog>0.85?(1-prog)/0.15:1);
    op*=0.9;
    const fk=0.82+Math.sin(f.flick)*0.18;
    const px=f.x*W+Math.sin(f.wobble)*W*0.005;
    const py=wy+f.y*(H-wy);
    const sc=f.sc*Math.min(W,H)*0.0016;
    drawLotusLantern(cx, cx, px, py, sc, op, fk, f.hue);
    // reflection mờ
    cx.save();
    cx.translate(px, py+8*f.sc);
    cx.scale(1,-0.18);
    cx.globalAlpha=op*0.15;
    cx.beginPath();
    cx.ellipse(0,0,28*f.sc*0.9,28*f.sc*0.9,0,0,Math.PI*2);
    cx.fillStyle=`hsl(${f.hue},90%,65%)`; cx.fill();
    cx.restore();
    // lời nguyện
    if(f.prayer&&op>0.35){
      cx.save();
      cx.font=`${Math.round(Math.min(W,H)*0.018)}px Georgia`;
      cx.fillStyle=`rgba(255,235,160,${op*0.8})`;
      cx.textAlign='center';
      cx.shadowColor=`rgba(255,180,50,${op*0.5})`;
      cx.shadowBlur=8;
      cx.fillText(f.prayer, px, py-46*f.sc-4);
      cx.restore();
    }
  });
  for(let i=floaters.length-1;i>=0;i--)
    if(floaters[i].age>=floaters[i].life) floaters.splice(i,1);

  // Title
  cx.save();
  cx.font=`${Math.round(W*0.021)}px Georgia`;
  cx.fillStyle='rgba(255,218,120,0.5)';
  cx.textAlign='center';
  cx.shadowColor='rgba(255,160,40,0.4)';
  cx.shadowBlur=12;
  cx.fillText('✦ Thả Hoa Đăng ✦', W/2, H*0.075);
  cx.restore();

  requestAnimationFrame(loop);
}
loop();

// spawn vài cái ban đầu
setTimeout(()=>{
  spawnFloater(0.25,'Bình an');
  spawnFloater(0.5,'Hạnh phúc');
  spawnFloater(0.72,'May mắn');
  addRipple(0.25,0.08); addRipple(0.5,0.06); addRipple(0.72,0.1);
},500);

// click nước
cv.addEventListener('click',e=>{
  const wy=H*0.5;
  if(e.clientY>wy-H*0.06){
    spawnFloater(e.clientX/W,'');
    addRipple(e.clientX/W,(e.clientY-wy)/(H-wy)*0.15+0.02);
  }
});

// nút thả
document.getElementById('tha-btn').addEventListener('click',()=>{
  const inp=document.getElementById('prayer-inp');
  const txt=inp.value.trim();
  const nx=0.25+Math.random()*0.5;
  spawnFloater(nx,txt);
  addRipple(nx,0.04+Math.random()*0.08);
  inp.value='';
});
document.getElementById('prayer-inp').addEventListener('keydown',e=>{
  if(e.key==='Enter') document.getElementById('tha-btn').click();
});
</script>
</body>
</html>
